version: "3"
services:
  dev:
    build:
      context: ..
      dockerfile: ./.devcontainer/Dockerfile
    volumes:
      ## mount repository
      - type: bind
        source: ../
        target: /workspace/WORKSPACE_NAME
      ## mount .gitconfig
      - type: bind
        source: ~/.gitconfig
        target: /home/DOCKER_USER/.gitconfig
      ## mask /dist
      # - type: volume
      #   target: /workspace/WORKSPACE_NAME/dist/
